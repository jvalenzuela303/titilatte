# =============================================================================
# Minimarket Platform — Docker Compose (base)
# Fase 1: postgres, backend, frontend, nginx
# Ejecutar siempre desde el directorio infra/:
#   docker compose up --build
# Las sobreescrituras de desarrollo están en docker-compose.override.yml
# =============================================================================

name: minimarket

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — base de datos principal
  # Volumen persistente para que los datos sobrevivan reinicios del contenedor.
  # Flyway (dentro del backend) ejecuta las migraciones al arranque.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: minimarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # pg_trgm y pgcrypto requeridos por el schema V5 y V1 respectivamente.
      # Se habilitan vía las migraciones Flyway; postgres solo necesita
      # que el usuario tenga permisos de superuser (default en imagen oficial).
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Postgres NO expone puerto al host en la imagen base.
    # Para acceso local (pgAdmin, DBeaver) el override de desarrollo
    # expone el puerto 5432.

  # ---------------------------------------------------------------------------
  # Backend — Java 21 + Spring Boot 3
  # Espera a que postgres esté healthy antes de arrancar (Flyway migrations).
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    container_name: minimarket-backend
    restart: unless-stopped
    environment:
      # DataSource — Flyway y Spring JPA leen esta misma URL
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      # Spring profile activo
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # JVM tuning — sobreescribible por override
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200}
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Spring Boot Actuator expone /actuator/health por defecto en puerto 8080
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # El puerto 8080 NO se expone al host; solo nginx accede por backend-net.
    # El puerto 5005 (JVM debug) se expone únicamente en el override de dev.

  # ---------------------------------------------------------------------------
  # Frontend — React 18 + Vite → build estático servido por nginx interno
  # En producción este contenedor es el que nginx (reverse proxy) usa.
  # En desarrollo el override reemplaza este servicio por el dev server de Vite.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: minimarket-frontend
    restart: unless-stopped
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy principal
  # Enruta /api/ → backend y todo lo demás → frontend SPA.
  # En Fase 4 aquí se agrega SSL (certbot / Let's Encrypt).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: minimarket-nginx
    restart: unless-stopped
    ports:
      # Puerto 80 expuesto al host; es el único punto de entrada público.
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    networks:
      - frontend-net
      - backend-net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# =============================================================================
# Redes internas
# frontend-net: nginx ↔ frontend
# backend-net:  nginx ↔ backend ↔ postgres
# Los contenedores solo pueden comunicarse con los servicios en su misma red.
# =============================================================================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# =============================================================================
# Volúmenes
# =============================================================================
volumes:
  postgres_data:
    driver: local
