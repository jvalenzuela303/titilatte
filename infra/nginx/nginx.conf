# =============================================================================
# Nginx — Reverse Proxy Principal
# Minimarket Platform — Fase 1 (HTTP, sin SSL — SSL se agrega en Fase 4)
#
# Responsabilidades:
#   - /api/      → upstream backend (Spring Boot :8080)
#   - /          → upstream frontend (React SPA)
#   - Rate limiting en /api/auth/ (protección brute-force login)
#   - Gzip, security headers, connection tuning
# =============================================================================

# Número de procesos worker. "auto" usa el número de CPU cores disponibles.
worker_processes auto;

# Archivo PID — en la imagen alpine el usuario no-root usa /tmp
pid /tmp/nginx.pid;

# Nivel de logging. En desarrollo se puede subir a "debug".
error_log /var/log/nginx/error.log warn;

events {
    # Máximo de conexiones simultáneas por worker.
    # Para desarrollo 1024 es suficiente.
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ---- Tipos MIME ----
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Formato de logs ----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ---- Optimizaciones de red ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;   # No revelar versión de nginx en headers

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;       # Balance velocidad / compresión (1–9)
    gzip_min_length 1024;    # No comprimir respuestas pequeñas
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---- Buffers y timeouts de proxy ----
    proxy_connect_timeout       10s;
    proxy_send_timeout          30s;
    proxy_read_timeout          30s;
    proxy_buffer_size           4k;
    proxy_buffers               8 8k;
    proxy_busy_buffers_size     16k;

    # ---- Rate Limiting ----
    # Zone "auth_limit": limita peticiones al endpoint de autenticación.
    # 10m = 10 MB de memoria para la tabla de estados (almacena ~160.000 IPs).
    # rate=5r/m = máximo 5 requests por minuto por IP.
    # Protege contra ataques de fuerza bruta en login.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Zone "api_limit": límite general para todas las rutas /api/.
    # rate=60r/m = 60 requests por minuto por IP (1 req/seg en promedio).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # ---- Upstreams ----
    # backend: Spring Boot en la red backend-net
    upstream backend {
        server backend:8080;
        keepalive 32;   # Mantiene conexiones keep-alive hacia el backend
    }

    # frontend: React SPA (dev server Vite en dev, nginx en producción)
    # El valor de FRONTEND_UPSTREAM varía entre base y override:
    #   - Base (producción):   frontend:80   (nginx estático dentro del contenedor)
    #   - Override (dev):      frontend:5173 (Vite dev server)
    # La variable se sustituye en tiempo de arranque con envsubst.
    upstream frontend {
        server ${FRONTEND_UPSTREAM};
        keepalive 16;
    }

    # ---- Virtual Host principal ----
    server {
        listen 80;
        server_name _;   # Acepta cualquier hostname (desarrollo sin dominio fijo)

        # Tamaño máximo del body (útil para uploads de imágenes de productos)
        client_max_body_size 10m;

        # ---- Security Headers (básicos para Fase 1, sin HSTS — Fase 4 agrega SSL) ----
        add_header X-Frame-Options          "DENY"                              always;
        add_header X-Content-Type-Options   "nosniff"                           always;
        add_header X-XSS-Protection         "1; mode=block"                     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=(), payment=()" always;
        # HSTS — enable once HTTPS is configured in Fase 4.
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Content-Security-Policy — script-src se inyecta vía ${CSP_SCRIPT_SRC} (envsubst).
        #   Producción (base):     'self'
        #   Desarrollo (override): 'self' 'unsafe-inline' — requerido por Vite HMR,
        #     que inyecta scripts inline para Hot Module Replacement.
        # connect-src incluye ${CSP_CONNECT_EXTRA} para ws:/wss: del websocket HMR de Vite.
        # style-src retains 'unsafe-inline' for CSS-in-JS (e.g. Emotion/MUI).
        add_header Content-Security-Policy
            "default-src 'self'; script-src ${CSP_SCRIPT_SRC}; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ${CSP_CONNECT_EXTRA}; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
            always;

        # ---- Health check de nginx (usado por Docker healthcheck) ----
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ---- Autenticación — rate limiting estricto ----
        # /api/v1/auth/login, /api/v1/auth/refresh, /api/v1/auth/logout
        location /api/v1/auth/ {
            # burst=3: permite ráfagas de hasta 3 requests acumulados.
            # nodelay: rechaza inmediatamente en lugar de encolar.
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- SSE — Server-Sent Events (/api/v1/events/) ----
        # DEBE declararse ANTES de "location /api/" para que nginx lo aplique
        # por precedencia (match más específico gana en bloques location).
        #
        # Requisitos del protocolo SSE:
        #   - proxy_buffering off : nginx debe enviar cada chunk al cliente en cuanto
        #     llega desde el backend. Si buffering está activo, los eventos se acumulan
        #     y el cliente no los recibe hasta que se llena el buffer (rompe SSE).
        #   - Connection '' : elimina el header Connection para evitar que el upstream
        #     cierre la conexión al finalizar cada response (mantiene HTTP/1.1 keep-alive).
        #   - proxy_read_timeout 3600s : las conexiones SSE son de larga duración; el
        #     timeout por defecto (30s) las cerraría prematuramente.
        #   - chunked_transfer_encoding on : permite enviar datos en chunks sin conocer
        #     el Content-Length total (necesario para streams infinitos).
        #
        # Rate limiting: se hereda de api_limit (60r/m) — suficiente para SSE ya que
        # cada cliente abre una sola conexión que luego permanece abierta.
        location /api/v1/events/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # Eliminar header Connection para mantener la conexión viva con el upstream
            proxy_set_header   Connection        '';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # CRÍTICO: deshabilitar buffering — sin esto los eventos SSE no llegan en tiempo real
            proxy_buffering    off;
            proxy_cache        off;

            # Timeout extendido para conexiones de larga duración
            proxy_read_timeout 3600s;

            # Permite enviar el stream sin Content-Length fijo
            chunked_transfer_encoding on;

            # Asegurar que el header Content-Type correcto llegue al cliente
            # (el backend Spring Boot ya lo envía; este proxy_hide_header evita
            # que nginx lo sobreescriba en caso de tener add_header global activo)
            proxy_hide_header X-Accel-Buffering;
        }

        # ---- API general (/api/) → backend Spring Boot ----
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Actuator — solo acceso interno (health visible, el resto bloqueado) ----
        # En Fase 1 solo exponemos /actuator/health para monitoreo básico.
        location /actuator/health {
            proxy_pass       http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }

        # Bloquear el resto de endpoints de actuator desde fuera
        location /actuator/ {
            return 403;
        }

        # ---- Assets estáticos del frontend — caché agresiva ----
        # Vite genera nombres con hash (main.a1b2c3d4.js) — inmutables.
        location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # La caché agresiva la pone el servidor de frontend (nginx interno o Vite).
            # Aquí solo pasamos el header que venga del upstream.
            proxy_cache_bypass $http_pragma;
        }

        # ---- Frontend SPA — React Router ----
        # Todos los demás paths van al frontend. El nginx del frontend
        # ya tiene configurado el try_files → index.html para React Router.
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
