# =============================================================================
# Minimarket Platform — Docker Compose Staging
# Fase 2: Ambiente staging (espejo de producción, sin hot-reload)
#
# Uso (desde el directorio infra/):
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml \
#                  --env-file .env.staging up -d
#
# Diferencias clave respecto a docker-compose.yml (base):
#   - No hay volúmenes de código fuente montados (usa imágenes compiladas)
#   - SPRING_PROFILES_ACTIVE=staging (sin swagger, logs reducidos)
#   - Healthchecks más estrictos: interval 30s, retries 5
#   - Límites de CPU y memoria por servicio (deploy.resources)
#   - JVM con heap ajustado para el ambiente staging
# =============================================================================

name: minimarket-staging

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — configuración idéntica a producción
  # Sin mapeo de puerto al host: el acceso es solo interno via backend-net.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: minimarket-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Volumen nombrado separado del de desarrollo para evitar colisiones
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Backend — Spring Boot 3 con perfil "staging"
  # Usa la imagen ya compilada (target runtime); sin volúmenes de código fuente.
  # Swagger UI deshabilitado en el perfil staging (configurar en application-staging.yml).
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runtime
    image: minimarket-backend:staging
    container_name: minimarket-staging-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Perfil fijo: staging. Deshabilita swagger, activa configuraciones de prod.
      SPRING_PROFILES_ACTIVE: staging
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      # JVM ajustado para staging — más heap que dev, menos que prod
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp}
      # Nivel de log configurable (default WARN en staging para reducir ruido)
      LOG_LEVEL: ${LOG_LEVEL:-WARN}
      # Variables de Fase 2
      REPORT_MAX_EXPORT_ROWS: ${REPORT_MAX_EXPORT_ROWS:-10000}
      CREDIT_CHECK_ENABLED: ${CREDIT_CHECK_ENABLED:-true}
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 320M

  # ---------------------------------------------------------------------------
  # Frontend — React build estático, sin dev server de Vite
  # No se monta código fuente; se usa la imagen compilada directamente.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: runtime
    image: minimarket-frontend:staging
    container_name: minimarket-staging-frontend
    restart: unless-stopped
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M

  # ---------------------------------------------------------------------------
  # Nginx — configuración idéntica a producción
  # Swagger no se expone (está deshabilitado en el perfil staging del backend).
  # Puerto configurable via NGINX_HTTP_PORT (default 80).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: minimarket-staging-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      # Solo se monta la configuración — sin código fuente
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net
      - backend-net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M

# =============================================================================
# Redes — misma topología que producción
# =============================================================================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# =============================================================================
# Volúmenes — nombrado separado para no interferir con datos de desarrollo
# =============================================================================
volumes:
  postgres_staging_data:
    driver: local
